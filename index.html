<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItzLoghotXD</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Website</h1>
        <p>Explore our range of digital products</p>
        <a href="#products" id="exploreBtn" class="btn">Explore Products</a>
    </header>

    <section id="products">
        <h2>Featured Products</h2>
        <div class="product">
            <img src="product1.jpg" alt="Software 1">
            <h3>Software 1</h3>
            <p>Description of Software 1</p>
            <a href="software1.html" class="btn">Learn More</a>
        </div>
        <!-- Repeat similar structure for other featured products -->
    </section>

    <footer>
        <nav>
            <ul>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </nav>
        <p>&copy; 2024 Your Company Name. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('exploreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const productsSection = document.getElementById('products');
            productsSection.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
